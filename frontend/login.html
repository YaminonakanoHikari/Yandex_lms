<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Яндекс Лицей — Вход</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo"><span class="logo-y">Я</span>ндекс Лицей</div>
    <div class="auth-subtitle">Программирование на Python</div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Вход</div>
      <div class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Регистрация</div>
    </div>

    <div id="authError" class="auth-error" style="display:none"></div>

    <div id="formLogin">
      <div class="field">
        <label>Логин</label>
        <input type="text" id="loginUsername" placeholder="username">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Войти</button>
    </div>

    <div id="formRegister" style="display:none">
      <div class="field">
        <label>Логин</label>
        <input type="text" id="regUsername" placeholder="username">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="regPassword" placeholder="минимум 6 символов">
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Зарегистрироваться</button>
    </div>

    <div class="divider-text">или</div>

    <a href="https://likeable-shauna-interjectionally.ngrok-free.dev/auth/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/>
      </svg>
      Войти через Google
    </a>

    <a href="#" class="btn-yandex" onclick="showYandexWarning(); return false;">
      <span style="font-weight:900;font-size:16px;color:#f00">Я</span>
      Войти через Яндекс
    </a>
  </div>

  <script>
    const API = 'https://likeable-shauna-interjectionally.ngrok-free.dev'

    if (localStorage.getItem('lms_token')) {
      window.location.href = 'index.html'
    }

    const savedTheme = localStorage.getItem('lms_theme')
    if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark')

    function switchAuthTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login')
      document.getElementById('tab-register').classList.toggle('active', tab === 'register')
      document.getElementById('formLogin').style.display = tab === 'login' ? 'block' : 'none'
      document.getElementById('formRegister').style.display = tab === 'register' ? 'block' : 'none'
      document.getElementById('authError').style.display = 'none'
    }

    function showError(msg) {
      const el = document.getElementById('authError')
      el.textContent = msg
      el.style.display = 'block'
    }

    function showYandexWarning() {
      showError('Это клон Яндекс ЛМС — официальное партнёрство не предусмотрено. Используй вход через Google или обычную регистрацию.')
    }

    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim()
      const password = document.getElementById('loginPassword').value
      if (!username || !password) return showError('Заполни все поля')
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      const data = await res.json()
      if (!res.ok) return showError(data.detail || 'Ошибка')
      localStorage.setItem('lms_token', data.token)
      localStorage.setItem('lms_username', data.username)
      window.location.href = 'index.html'
    }

    async function doRegister() {
      const username = document.getElementById('regUsername').value.trim()
      const email = document.getElementById('regEmail').value.trim()
      const password = document.getElementById('regPassword').value
      if (!username || !email || !password) return showError('Заполни все поля')
      if (password.length < 6) return showError('Пароль минимум 6 символов')
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      })
      const data = await res.json()
      if (!res.ok) return showError(data.detail || 'Ошибка')
      localStorage.setItem('lms_token', data.token)
      localStorage.setItem('lms_username', data.username)
      window.location.href = 'index.html'
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const tab = document.getElementById('tab-login').classList.contains('active')
        tab ? doLogin() : doRegister()
      }
    })
  </script>
</body>
</html>
