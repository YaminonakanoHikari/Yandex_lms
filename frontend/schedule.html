<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Яндекс Лицей — Расписание</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .schedule-main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      background: var(--bg);
    }
    .page-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 24px;
      color: var(--text);
    }
    .week-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .week-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      font-family: var(--sans);
      transition: background 0.1s;
    }
    .week-btn:hover { background: var(--light); }
    .week-label { font-size: 15px; font-weight: 700; color: var(--text); }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .cal-day {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 8px;
      min-height: 90px;
    }
    .cal-day.today { border-color: var(--green); }
    .cal-day-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 0.4px;
    }
    .cal-day-num {
      font-size: 18px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 6px;
    }
    .cal-day.today .cal-day-num { color: var(--green); }
    .cal-event {
      background: var(--yellow);
      color: #000;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      font-weight: 600;
      margin-bottom: 3px;
      cursor: pointer;
    }
    .cal-event.deadline { background: #fde; color: var(--red); }
    .cal-event.lesson { background: #e8f5ee; color: var(--green); }

    .upcoming-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; color: var(--text); }
    .event-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--yellow);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.1s;
    }
    .event-item:hover { transform: translateX(2px); }
    .event-item.lesson { border-left-color: var(--green); }
    .event-item.deadline { border-left-color: var(--red); }
    .event-date {
      text-align: center;
      min-width: 48px;
    }
    .event-day { font-size: 22px; font-weight: 900; color: var(--text); }
    .event-month { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .event-info { flex: 1; }
    .event-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .event-desc { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .event-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-lesson { background: #e8f5ee; color: var(--green); }
    .badge-deadline { background: #fde; color: var(--red); }
    .badge-exam { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>
  <header>
    <div class="logo"><span class="logo-y">Я</span>ндекс</div>
    <div class="nav-links">
      <div class="nav-link" onclick="location.href='overview.html'">Обзор</div>
      <div class="nav-link" onclick="location.href='index.html'">Задания</div>
      <div class="nav-link active" onclick="location.href='schedule.html'">Расписание</div>
    </div>
    <div class="header-right">
      <div class="header-score">Баллы: <strong id="totalScore">0</strong></div>
      <div class="user-name" id="userName"></div>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </header>

  <div class="subnav">
    <div class="subnav-link" onclick="location.href='overview.html'">Обзор</div>
    <div class="subnav-link" onclick="location.href='index.html'">Задания</div>
    <div class="subnav-link active">Расписание</div>
  </div>

  <div class="schedule-main">
    <div class="page-title">Расписание</div>

    <div class="week-nav">
      <button class="week-btn" onclick="changeWeek(-1)">‹ Назад</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="week-btn" onclick="changeWeek(1)">Вперёд ›</button>
    </div>

    <div class="calendar-grid" id="calGrid"></div>

    <div class="upcoming-title">Ближайшие события</div>
    <div id="eventsList"></div>
  </div>

  <script>
    const token = localStorage.getItem('lms_token')
    if (!token) window.location.href = 'login.html'
    const username = localStorage.getItem('lms_username') || 'Пользователь'

    function logout() { localStorage.clear(); window.location.href = 'login.html' }
    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark'
      document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark')
      document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️'
      localStorage.setItem('lms_theme', isDark ? 'light' : 'dark')
    }
    const savedTheme = localStorage.getItem('lms_theme')
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark')
      document.getElementById('themeBtn').textContent = '☀️'
    }

    document.getElementById('userName').textContent = username
    document.getElementById('totalScore').textContent =
      Object.values(JSON.parse(localStorage.getItem('lms_scores') || '{}')).reduce((a,b)=>a+b,0)

    const EVENTS = [
      { date: '2026-03-23', type: 'lesson', name: 'Урок: Циклы while и for', desc: 'Разбор заданий, практика' },
      { date: '2026-03-25', type: 'deadline', name: 'Дедлайн: Домашнее задание', desc: 'Факториал, Числа Фибоначчи' },
      { date: '2026-03-27', type: 'lesson', name: 'Урок: Словари', desc: 'Новая тема, разминка' },
      { date: '2026-03-30', type: 'exam', name: 'Самостоятельная работа №3', desc: 'По темам: Циклы, Списки' },
      { date: '2026-04-01', type: 'lesson', name: 'Урок: Строки и методы', desc: 'split, join, format' },
      { date: '2026-04-03', type: 'deadline', name: 'Дедлайн: RE задачи', desc: 'Корпорация Амбрелла, Вирус T, S.T.A.R.S.' },
      { date: '2026-04-06', type: 'lesson', name: 'Урок: Функции', desc: 'def, return, аргументы' },
    ]

    const DAYS = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс']
    const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря']

    let weekOffset = 0

    function getMonday(d) {
      const date = new Date(d)
      const day = date.getDay() || 7
      date.setDate(date.getDate() - day + 1)
      return date
    }

    function formatDate(d) {
      return d.toISOString().split('T')[0]
    }

    function renderCalendar() {
      const today = new Date()
      const monday = getMonday(today)
      monday.setDate(monday.getDate() + weekOffset * 7)

      const weekEnd = new Date(monday)
      weekEnd.setDate(weekEnd.getDate() + 6)

      document.getElementById('weekLabel').textContent =
        `${monday.getDate()} ${MONTHS[monday.getMonth()]} — ${weekEnd.getDate()} ${MONTHS[weekEnd.getMonth()]} ${weekEnd.getFullYear()}`

      let html = ''
      for (let i = 0; i < 7; i++) {
        const day = new Date(monday)
        day.setDate(day.getDate() + i)
        const dateStr = formatDate(day)
        const isToday = formatDate(today) === dateStr
        const dayEvents = EVENTS.filter(e => e.date === dateStr)

        html += `<div class="cal-day ${isToday ? 'today' : ''}">
          <div class="cal-day-header">${DAYS[i]}</div>
          <div class="cal-day-num">${day.getDate()}</div>`

        dayEvents.forEach(e => {
          html += `<div class="cal-event ${e.type}">${e.name.split(':')[0]}</div>`
        })
        html += `</div>`
      }
      document.getElementById('calGrid').innerHTML = html
    }

    function renderEvents() {
      const today = formatDate(new Date())
      const upcoming = EVENTS
        .filter(e => e.date >= today)
        .sort((a, b) => a.date.localeCompare(b.date))
        .slice(0, 5)

      const typeLabel = { lesson: 'Урок', deadline: 'Дедлайн', exam: 'Контрольная' }
      const typeClass = { lesson: 'badge-lesson', deadline: 'badge-deadline', exam: 'badge-exam' }

      document.getElementById('eventsList').innerHTML = upcoming.map(e => {
        const d = new Date(e.date)
        return `
          <div class="event-item ${e.type} animate-fade">
            <div class="event-date">
              <div class="event-day">${d.getDate()}</div>
              <div class="event-month">${MONTHS[d.getMonth()]}</div>
            </div>
            <div class="event-info">
              <div class="event-name">${e.name}</div>
              <div class="event-desc">${e.desc}</div>
            </div>
            <span class="event-badge ${typeClass[e.type]}">${typeLabel[e.type]}</span>
          </div>`
      }).join('')
    }

    function changeWeek(dir) {
      weekOffset += dir
      renderCalendar()
    }

    renderCalendar()
    renderEvents()
  </script>
</body>
</html>
