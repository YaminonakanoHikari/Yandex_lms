<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Яндекс Лицей — Python</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo"><span class="logo-y">Я</span>ндекс</div>
  <div class="nav-links">
    <div class="nav-link">Обзор</div>
    <div class="nav-link active">Задания</div>
    <div class="nav-link">Расписание</div>
  </div>
  <div class="header-right">
    <div class="header-score">Баллы: <span id="totalScore">0</span></div>
    <div class="user-name" id="userName"></div>
    <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px" onclick="logout()">Выйти</button>
  </div>
</header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">Задачи</div>
      <div id="taskList">Загрузка...</div>
    </aside>
    <main class="main" id="main">
      <div class="empty-state">
        <div class="empty-icon">🐍</div>
        <div class="empty-title">Выбери задачу слева</div>
        <div class="empty-sub">Реши задачу — получи баллы и AI-ревью от преподавателя</div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
